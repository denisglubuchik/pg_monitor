global:
  resolve_timeout: 5m

route:
  receiver: telegram-default
  group_by: [alertname, db_identifier, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: telegram-default
    telegram_configs:
      - bot_token: "8790402532:AAHNenNd5VJ9veHgTP-YIvNOdKo58lDVuN8"
        chat_id: 456222245
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}</b>
          Severity: {{ .CommonLabels.severity }}
          DB: {{ .CommonLabels.db_identifier }}
          {{ if .CommonLabels.path }}Path: {{ .CommonLabels.path }}{{ end }}

          {{ range .Alerts }}- {{ .Annotations.summary }}
            {{ .Annotations.description }}
          {{ end }}
