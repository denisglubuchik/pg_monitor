server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - replacement: docker
        target_label: job

    pipeline_stages:
      - docker: {}

      - match:
          selector: '{service=~"api|collector"}'
          stages:
            - json:
                expressions:
                  level: level
            - labels:
                level:

      - match:
          selector: '{service="postgres"}'
          stages:
            - regex:
                expression: '^(?P<level>ERROR|FATAL|PANIC|WARNING|LOG|INFO|DEBUG|DETAIL|NOTICE|HINT|STATEMENT):'
            - labels:
                level:
