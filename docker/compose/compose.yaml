services:
  postgres:
    image: postgres:16-alpine
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrator:
    build:
      context: ../../
      dockerfile: docker/app/Dockerfile
      target: migrator
    env_file:
      - ../env/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../../
      dockerfile: docker/app/Dockerfile
      target: api
    env_file:
      - ../env/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  collector:
    build:
      context: ../../
      dockerfile: docker/app/Dockerfile
      target: worker
    env_file:
      - ../env/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  loki:
    image: grafana/loki:3.3.2
    command:
      - "-config.file=/etc/loki/loki.yml"
    volumes:
      - ../loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.3.2
    command:
      - "-config.file=/etc/promtail/promtail.yml"
    depends_on:
      loki:
        condition: service_started
    volumes:
      - ../promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/tmp

  prometheus:
    image: prom/prometheus:v3.2.1
    depends_on:
      api:
        condition: service_started
      alertmanager:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.28.1
    env_file:
      - ../env/.env.docker
    entrypoint:
      - "/bin/sh"
      - "-ec"
    command:
      - |
        sed \
          -e "s|__TELEGRAM_BOT_TOKEN__|$${TELEGRAM_BOT_TOKEN:-disabled}|g" \
          -e "s|__TELEGRAM_CHAT_ID__|$${TELEGRAM_CHAT_ID:-0}|g" \
          /etc/alertmanager/alertmanager.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager
    volumes:
      - ../alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:11.5.2
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  loki-data:
  promtail-positions:
